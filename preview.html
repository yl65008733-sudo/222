<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>旅行纪念册预览</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Travel notes since last year</p>
        <h1>我们的旅行纪念册</h1>
        <p class="hero__copy">
          给一起出发的人留一页：那些路上没说完的话、没摆好的合照、还有每次回来之后依然会想起的瞬间。
        </p>
        <div class="hero__stats">
          <div class="stat"><strong>2</strong><span>段旅程</span></div>
          <div class="stat"><strong>2</strong><span>个地方</span></div>
          <div class="stat"><strong>6</strong><span>位朋友</span></div>
        </div>
      </div>
      <div class="hero__film">
        <figure class="film-card film-card--1">
          <img src="./public/photos/taizhou-09.jpg" alt="" />
          <figcaption>浙江台州</figcaption>
        </figure>
        <figure class="film-card film-card--2">
          <img src="./public/photos/nanjing-05.jpg" alt="" />
          <figcaption>江苏南京</figcaption>
        </figure>
      </div>
    </header>
    <main>
      <section class="section timeline-section">
        <div class="section-heading">
          <p class="eyebrow">Timeline</p>
          <h2>从第一次出发开始</h2>
        </div>
        <div class="timeline">
          <article class="trip-card">
            <div class="trip-card__marker">02</div>
            <div class="trip-card__body">
              <div class="trip-card__meta">
                <span>2026年1月</span>
                <span>江苏南京</span>
              </div>
              <h2>元旦去了南京</h2>
              <p>
                2026 年 1 月 1 日，元旦的时候去了南京。吃了热气很足的火锅和药膳鸡，也去了欢乐谷，坐过山车、坐摩天轮，把新年的第一天过得很满。
              </p>
              <div class="highlight">
                <span>高光瞬间</span>
                <strong>最后坐在摩天轮里看夕阳的时候，好像这一趟突然变得很值得记住。</strong>
              </div>
              <div class="people-list">
                <span>zr</span>
                <span>南京同行朋友</span>
              </div>
              <div class="photo-grid">
                <figure class="photo-card">
                  <img src="./public/photos/nanjing-01.jpg" alt="zr 靠在红色沙发上休息" />
                  <figcaption><span>01</span>zr 几乎每次旅行都有他</figcaption>
                </figure>
                <figure class="photo-card">
                  <img src="./public/photos/nanjing-02.jpg" alt="南京旅行中一起吃的火锅" />
                  <figcaption><span>02</span>元旦的第一顿热气腾腾</figcaption>
                </figure>
                <figure class="photo-card">
                  <img src="./public/photos/nanjing-03.jpg" alt="南京旅行中吃的药膳鸡" />
                  <figcaption><span>03</span>还吃了药膳鸡</figcaption>
                </figure>
                <figure class="photo-card">
                  <img src="./public/photos/nanjing-04.jpg" alt="朋友们在南京欢乐谷排队时自拍" />
                  <figcaption><span>04</span>去欢乐谷，排队也要拍照</figcaption>
                </figure>
                <figure class="photo-card">
                  <img src="./public/photos/nanjing-05.jpg" alt="朋友们坐在摩天轮里看夕阳自拍" />
                  <figcaption><span>05</span>最后一张是在摩天轮上</figcaption>
                </figure>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
